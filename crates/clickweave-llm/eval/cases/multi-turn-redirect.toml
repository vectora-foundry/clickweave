name = "Multi-turn: redirect message target"

[[turns]]
prompt = "Open Signal, click on Alice's chat, type 'hello' and send it"
[turns.expect]
min_nodes = 4
max_nodes = 8
required_tools = ["launch_app", "cdp_click", "cdp_type_text", "cdp_press_key"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]

[[turns]]
prompt = "After that click on Bob's chat, type 'yo' and send it"
[turns.expect]
min_nodes = 7
max_nodes = 14
required_tools = ["launch_app", "cdp_click", "cdp_type_text", "cdp_press_key"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]

[[turns]]
prompt = "Wait, don't send to Alice, send to Michael instead"
[turns.expect]
min_nodes = 7
max_nodes = 14
required_tools = ["cdp_click", "cdp_type_text", "cdp_press_key"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]
