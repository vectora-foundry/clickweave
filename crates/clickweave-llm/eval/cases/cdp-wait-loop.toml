name = "CDP: Loop-based wait in Electron app"

[[turns]]
prompt = "Open Discord, click on the #announcements channel, then keep checking until you see the text 'meeting starts now' appear, then click the Join button"
[turns.expect]
min_nodes = 5
max_nodes = 10
required_tools = ["launch_app", "cdp_click", "cdp_wait_for"]
