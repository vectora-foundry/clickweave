name = "Redirect message to earlier chat"

[[turns]]
prompt = "Open Signal. Click on the chat with Alice, then click on the chat with Bob, then click on the chat with Carol. Now go back to Bob's chat and send the message 'See you tomorrow'"
[turns.expect]
min_nodes = 6
max_nodes = 16
required_tools = ["launch_app", "cdp_click", "cdp_type_text"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]
