name = "Multi-turn: extend and modify workflow"

[[turns]]
prompt = "Open Calculator, calculate 5 times 6"
[turns.expect]
min_nodes = 4
max_nodes = 8
required_tools = ["launch_app", "click"]

[[turns]]
prompt = "Also take a screenshot of the result"
[turns.expect]
min_nodes = 5
max_nodes = 9
required_tools = ["launch_app", "click", "take_screenshot"]

[[turns]]
prompt = "Before the screenshot, type the result into TextEdit"
[turns.expect]
min_nodes = 7
max_nodes = 12
required_tools = ["launch_app", "click", "type_text", "take_screenshot"]
