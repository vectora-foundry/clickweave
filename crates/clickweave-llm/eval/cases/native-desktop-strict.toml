name = "Native: desktop app strict (no CDP)"

[[turns]]
prompt = "Open TextEdit, type 'Hello World', select all text with Cmd+A, copy it with Cmd+C, then open a new document with Cmd+N and paste with Cmd+V"
[turns.expect]
min_nodes = 5
max_nodes = 9
required_tools = ["launch_app", "type_text", "press_key"]
forbidden_tools = ["cdp_click", "cdp_type_text", "cdp_press_key", "cdp_hover", "cdp_fill", "cdp_navigate", "cdp_new_page", "cdp_close_page", "cdp_select_page", "cdp_handle_dialog", "cdp_wait_for", "fill", "navigate_page", "new_page", "close_page", "select_page", "handle_dialog", "wait_for"]
