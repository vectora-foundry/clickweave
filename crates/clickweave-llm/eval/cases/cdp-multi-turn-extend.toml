name = "CDP multi-turn: extend Electron workflow"

[[turns]]
prompt = "Open Slack, click on the #general channel, type 'hello' and send it"
[turns.expect]
min_nodes = 4
max_nodes = 8
required_tools = ["launch_app", "cdp_click", "cdp_type_text", "cdp_press_key"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]

[[turns]]
prompt = "After sending, also click on the #random channel and type 'test' and send it"
[turns.expect]
min_nodes = 7
max_nodes = 14
required_tools = ["launch_app", "cdp_click", "cdp_type_text", "cdp_press_key"]
forbidden_tools = ["click", "type_text", "press_key", "scroll", "drag", "move_mouse"]
